dist: xenial

language: python

python:
  - "3.7"

services:
  postgresql

addons:
  postgresql: '9.5'

install:
  - cp contrib/env-sample .env
  - pip install -r requirements.txt

before_script:
  - psql -c "CREATE DATABASE testdb;" -U postgres
  - python manage.py migrate --noinput
  - python manage.py collectstatic --noinput

script:
  - python manage.py test
